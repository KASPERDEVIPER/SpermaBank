<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpermMobile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Верхняя панель -->
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <span class="logo-icon">🏦</span>
                <span class="logo-text">SpermaBank</span>
            </div>
            <button class="notification-btn">
                <span class="bell-icon">🔔</span>
                <span class="badge">3</span>
            </button>
        </div>
        <div class="user-greeting">
            <div class="avatar">👤</div>
            <div>
                <div class="greeting-text">Добрый день</div>
                <div class="user-name">Арсений</div>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="main-content">
        <!-- Баланс карты -->
        <section class="balance-card">
            <div class="card-header">
                <span>💳 СЧЕТ</span>
                <span class="card-type">Sperm latinum</span>
            </div>
            <div class="card-number">•••• 4832</div>
            <div class="balance-amount">-1 200 ₽</div>
            <div class="card-actions">
                <button class="action-btn">Пополнить</button>
                <button class="action-btn outline">Перевести</button>
            </div>
        </section>

        <!-- История операций -->
        <section class="history">
            <div class="history-header">
                <h2 class="section-title">Последние операции</h2>
                <button class="link-btn">Все →</button>
            </div>
            <div class="transaction">
                <div class="transaction-icon income">↓</div>
                <div class="transaction-info">
                    <div class="transaction-name">Зарплата</div>
                    <div class="transaction-date">Сегодня, 14:30</div>
                </div>
                <div class="transaction-amount income">+450 ₽</div>
            </div>
            <div class="transaction">
                <div class="transaction-icon expense">↑</div>
                <div class="transaction-info">
                    <div class="transaction-name">Кофейня "Штурвал удовольствий"</div>
                    <div class="transaction-date">Вчера, 09:15</div>
                </div>
                <div class="transaction-amount expense">-350 ₽</div>
            </div>
            <div class="transaction">
                <div class="transaction-icon expense">↑</div>
                <div class="transaction-info">
                    <div class="transaction-name">МТС пополнение</div>
                    <div class="transaction-date">15 апр, 18:42</div>
                </div>
                <div class="transaction-amount expense">-500 ₽</div>
            </div>
        </section>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <button class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">💳</span>
            <span>Карты</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">📊</span>
            <span>Анал</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Пидр</span>
        </button>
    </nav>
</body>
</html>
