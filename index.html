<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Иконка для iOS (iPhone/iPad) при добавлении на домашний экран -->
    <link rel="apple-touch-icon" href="Иконка.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Иконка.png">
    <link rel="apple-touch-icon" sizes="152x152" href="Иконка.png">
    <link rel="apple-touch-icon" sizes="120x120" href="Иконка.png">
    
    <!-- Дополнительно: стандартный favicon -->
    <link rel="icon" type="image/png" href="Иконка.png">
    <link rel="shortcut icon" type="image/png" href="Иконка.png">
    
    <!-- Настройка отображения как веб-приложения на iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SpermaBank">
    
    <title>SpermaBank</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Верхняя панель -->
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <span class="logo-icon">🏦</span>
                <span class="logo-text">SpermaBank</span>
            </div>
            <button class="notification-btn">
                <span class="bell-icon">🔔</span>
                <span class="badge">3</span>
            </button>
        </div>
        <div class="user-greeting">
            <div class="avatar">👤</div>
            <div>
                <div class="greeting-text">Добрый день</div>
                <div class="user-name">Арсений</div>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="main-content">
        <!-- Баланс карты -->
        <section class="balance-card">
            <div class="card-header">
                <span>💳 СЧЕТ</span>
                <span class="card-type">Sperm latinum</span>
            </div>
            <div class="card-number">•••• 4832</div>
            <div class="balance-amount negative">-1 200 ₽</div>
            <div class="card-actions">
                <button class="action-btn">Пополнить</button>
                <button class="action-btn outline">Перевести</button>
            </div>
        </section>

        <!-- Быстрые действия -->
        <section class="quick-actions">
            <h2 class="section-title">Быстрые действия</h2>
            <div class="actions-grid">
                <button class="action-item">
                    <span class="action-icon">📱</span>
                    <span>Связь</span>
                </button>
                <button class="action-item">
                    <span class="action-icon">💡</span>
                    <span>ЖКХ</span>
                </button>
                <button class="action-item">
                    <span class="action-icon">🛒</span>
                    <span>Магазин</span>
                </button>
                <button class="action-item">
                    <span class="action-icon">🎮</span>
                    <span>Игры</span>
                </button>
                <button class="action-item">
                    <span class="action-icon">🏥</span>
                    <span>Здоровье</span>
                </button>
                <button class="action-item">
                    <span class="action-icon">🎓</span>
                    <span>Учеба</span>
                </button>
            </div>
        </section>

        <!-- История операций -->
        <section class="history">
            <div class="history-header">
                <h2 class="section-title">Последние операции</h2>
                <button class="link-btn">Все →</button>
            </div>
            <div class="transaction">
                <div class="transaction-icon income">↓</div>
                <div class="transaction-info">
                    <div class="transaction-name">Зарплата</div>
                    <div class="transaction-date">Сегодня, 14:30</div>
                </div>
                <div class="transaction-amount income">+450 ₽</div>
            </div>
            <div class="transaction">
                <div class="transaction-icon expense">↑</div>
                <div class="transaction-info">
                    <div class="transaction-name">Кофейня "Штурвал удовольствий"</div>
                    <div class="transaction-date">Вчера, 09:15</div>
                </div>
                <div class="transaction-amount expense">-350 ₽</div>
            </div>
            <div class="transaction">
                <div class="transaction-icon expense">↑</div>
                <div class="transaction-info">
                    <div class="transaction-name">МТС пополнение</div>
                    <div class="transaction-date">15 апр, 18:42</div>
                </div>
                <div class="transaction-amount expense">-500 ₽</div>
            </div>
        </section>
    </main>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <button class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">💳</span>
            <span>Карты</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">📊</span>
            <span>Аналитика</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </button>
    </nav>
</body>
</html>
